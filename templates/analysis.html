<!DOCTYPE html>
<html>
<head>
    <title>Analysis - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin Scorecard</a></div>
    </nav>
    <div class="container text-center">
        <div class="card p-5 shadow mx-auto" style="max-width: 400px;">
            <h5 class="text-muted text-uppercase mb-3">Neural Credit Score</h5>
            <div id="score-val" class="display-1 fw-bold text-success mb-3">--</div>
            <p id="status-text" class="lead text-dark mb-4">Awaiting Calculation...</p>
            <button id="score-btn" class="btn btn-success btn-lg w-100 py-3 shadow">CALCULATE SCORE</button>
        </div>
    </div>
    <script>
        document.getElementById('score-btn').onclick = async () => {
            const res = await fetch('/api/score', { method: 'POST' });
            const data = await res.json();
            document.getElementById('score-val').innerText = data.score;
            document.getElementById('status-text').innerText = data.details;
        };
    </script>
</body>
</html>
