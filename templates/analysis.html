<!DOCTYPE html>
<html>
<head>
    <title>AI Analysis | AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light text-center">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI Analysis</a></div>
    </nav>

    <div class="container">
        <div class="card mx-auto shadow border-0 p-5" style="max-width: 500px;">
            <h4 class="text-muted text-uppercase mb-3">Neural Credit Score</h4>
            <div id="score-val" class="display-1 fw-bold text-success mb-3">--</div>
            <p id="status-text" class="lead text-dark italic mb-4">Awaiting Satellite Link...</p>
            <button id="score-btn" class="btn btn-success btn-lg w-100 py-3 shadow">DISBURSE LOAN AGREEMENT</button>
        </div>
    </div>

    <script>
        document.getElementById('score-btn').onclick = async () => {
            const res = await fetch('/api/score', { method: 'POST' });
            const data = await res.json();
            document.getElementById('score-val').innerText = data.score;
            document.getElementById('status-text').innerText = data.details;
        };
    </script>
</body>
</html>
