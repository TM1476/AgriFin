<!DOCTYPE html>
<html>
<head>
    <title>Analysis - AgriAI</title>fin 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🌾 AgriFin AI</a>
    </div>
</nav>

<div class="container">
    <div class="hero-text-area">
        <h1>Credit Analysis</h1>
        <p class="lead">Processing Satellite & Field Data</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 text-center">
                <h4 class="text-success fw-bold mb-4">Neural Credit Score</h4>
                <div id="score-display" class="display-1 fw-bold text-success mb-3">--</div>
                <p id="details-display" class="text-muted mb-4">Click to generate final report</p>
                <button id="calc-btn" class="btn btn-success btn-lg w-100 fw-bold">Calculate Now</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('calc-btn').onclick = async function() {
        this.innerText = "Analyzing...";
        try {
            const res = await fetch('/api/score', { method: 'POST' });
            const data = await res.json();
            
            document.getElementById('score-display').innerText = data.score;
            document.getElementById('details-display').innerText = data.details;
            this.innerText = "Analysis Complete";
        } catch (e) {
            alert("Connection Error");
        }
    };
</script>

</body>
</html>
