<!DOCTYPE html>
<html>
<head>
    <title>Audit - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI</a></div>
    </nav>

    <div class="container">
        <div class="hero-text-area">
            <h1>Document Audit</h1>
            <p class="lead">AI Verification of Land Records & KYC</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5 text-center">
                    <div class="scan-area mb-4">
                        <div class="scan-line"></div>
                        <div class="d-flex align-items-center justify-content-center h-100 text-white-50">
                            <small>Document Scanning Engine Online...</small>
                        </div>
                    </div>
                    <label class="btn btn-outline-success btn-lg w-100 mb-3 shadow-sm py-3" style="cursor: pointer;">
                        UPLOAD LAND RECORD
                        <input type="file" class="d-none" onchange="document.getElementById('nxt').classList.remove('d-none')">
                    </label>
                    <a href="/analysis" id="nxt" class="btn btn-success btn-lg w-100 d-none fw-bold shadow">RUN CREDIT ANALYSIS</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
