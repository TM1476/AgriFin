<!DOCTYPE html>
<html>
<head>
    <title>Audit - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🌾 AgriFin AI</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero-text-area">
            <h1>Document Audit</h1>
            <p class="lead">Verifying Ownership & Land Records</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5 text-center shadow-lg">
                    <div class="scan-area mb-4">
                        <div class="scan-line" id="scanner" style="display:none;"></div>
                        <div class="d-flex align-items-center justify-content-center h-100 text-muted">
                            <small id="status-text">Awaiting Official Document...</small>
                        </div>
                    </div>

                    <label class="btn btn-outline-success btn-lg w-100 mb-3 py-3 shadow-sm" style="cursor: pointer;">
                        UPLOAD LAND RECORD
                        <input type="file" id="fileInput" class="d-none" accept="image/*,.pdf">
                    </label>

                    <div id="processing-msg" style="display:none;" class="text-success mb-3 italic fw-bold">
                        <span class="spinner-border spinner-border-sm"></span> AI Extracting Metadata...
                    </div>

                    <a href="/analysis" id="proceedBtn" class="btn btn-success btn-lg w-100 d-none fw-bold shadow">
                        PROCEED TO ANALYSIS
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('fileInput').onchange = function(e) {
            if (e.target.files.length > 0) {
                // 1. Show scanning animation & update text
                document.getElementById('scanner').style.display = 'block';
                document.getElementById('status-text').innerText = "Analyzing: " + e.target.files[0].name;
                document.getElementById('processing-msg').style.display = 'block';
                
                // 2. Simulate AI Processing Delay
                setTimeout(() => {
                    document.getElementById('processing-msg').innerHTML = "✔️ Verification Successful";
                    document.getElementById('proceedBtn').classList.remove('d-none');
                    document.getElementById('scanner').style.display = 'none'; // Stop scan line
                    document.getElementById('status-text').innerText = "Analysis Ready";
                }, 2500);
            }
        };
    </script>
</body>
</html>
