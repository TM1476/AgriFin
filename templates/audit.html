<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="/static/css/style.css"></head>
<body class="flex items-center justify-center min-h-screen text-center">
    <div class="glass p-12 w-[500px]">
        <h2 class="text-2xl font-bold mb-6">Land Deed Audit</h2>
        <div class="scan-area mb-8"><div class="scan-line"></div></div>
        <label class="block border-2 border-dashed border-emerald-500/40 p-10 rounded-2xl cursor-pointer hover:bg-emerald-500/5 transition-all">
            <span class="text-emerald-500 font-bold uppercase">UPLOAD DOCUMENT</span>
            <input type="file" class="hidden" onchange="document.getElementById('nxt').style.display='block'">
        </label>
        <a href="/analysis" id="nxt" class="hidden mt-8 block w-full py-4 bg-emerald-500 text-black font-black rounded-2xl">RUN NEURAL SCORE</a>
    </div>
</body>
</html>
