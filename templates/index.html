<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Core | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-10 w-96 text-center shadow-2xl">
        <h1 class="text-3xl font-black mb-6">Create Identity</h1>
        <input type="email" id="email" placeholder="Farmer ID" class="w-full p-4 mb-4 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-emerald-500 text-white">
        <input type="password" id="pass" placeholder="Secure Pin" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-emerald-500 text-white">
        
        <button onclick="handleReg()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-xl uppercase hover:bg-emerald-400 transition-all">INITIALIZE</button>
    </div>

    <script>
        // 1. Your Actual Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB_WZL5Lb-vAvQfAyOlReoQAo4blsi5T3k",
            authDomain: "agrifin-1b173.firebaseapp.com",
            projectId: "agrifin-1b173",
            storageBucket: "agrifin-1b173.firebasestorage.app",
            messagingSenderId: "778654496149",
            appId: "1:778654496149:web:8252db245c5b52561ab29c",
            measurementId: "G-YR9YB0GJPV"
        };

        // 2. Initialize Firebase (Compat Style)
        firebase.initializeApp(firebaseConfig);

        // 3. Registration Logic
        function handleReg() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;

            // Basic validation
            if(!e || !p) {
                alert("Please fill in both fields");
                return;
            }

            firebase.auth().createUserWithEmailAndPassword(e, p)
                .then((userCredential) => {
                    console.log("Registered:", userCredential.user);
                    window.location.href = "/home";
                })
                .catch((error) => {
                    alert(error.message);
                });
        }
    </script>
</body>
</html>
