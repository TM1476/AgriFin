<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-10 w-96 text-center">
        <h1 class="text-3xl font-black mb-6">Create Identity</h1>
        <input type="email" id="email" placeholder="Farmer ID" class="w-full p-4 mb-4 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-emerald-500 text-white">
        <input type="password" id="pass" placeholder="Secure Pin" class="w-full p-4 mb-6 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-emerald-500 text-white">
        <button onclick="handleReg()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-xl uppercase">INITIALIZE</button>
    </div>
    <script>
        const firebaseConfig = { apiKey: "YOUR_KEY", authDomain: "YOUR_DOMAIN.firebaseapp.com" };
        firebase.initializeApp(firebaseConfig);
        function handleReg() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            firebase.auth().createUserWithEmailAndPassword(e, p).then(() => window.location.href="/home").catch(a => alert(a.message));
        }
    </script>
</body>
</html>
