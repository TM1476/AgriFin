<!DOCTYPE html>
<html>
<head>
    <title>Voice Intake - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI Assistant</a></div>
    </nav>
    <div class="container text-center">
        <div class="card shadow p-5 mx-auto" style="max-width: 500px;">
            <h2 class="text-success mb-4">Voice Intake</h2>
            <div id="mic-btn" class="btn btn-outline-success rounded-circle mb-4" style="width: 80px; height: 80px; font-size: 2rem; cursor: pointer;">🎤</div>
            <div id="v-out" class="p-3 bg-white border rounded mb-4 italic">Awaiting voice...</div>
            <a href="/audit" class="btn btn-success btn-lg w-100">Next: Document Audit</a>
        </div>
    </div>
    <script>
        const mic = document.getElementById('mic-btn');
        mic.onclick = () => {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRec();
            rec.start();
            mic.innerText = "⏳";
            rec.onresult = (e) => {
                document.getElementById('v-out').innerText = `PARSED: ${e.results[0][0].transcript}`;
                mic.innerText = "🎤";
            };
        };
    </script>
</body>
</html>
