<!DOCTYPE html>
<html>
<head>
    <title>Onboarding - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI</a></div>
    </nav>
    <div class="container">
        <div class="hero-text-area"><h1>Voice Intake</h1></div>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5 text-center">
                    <center><div id="mic-btn" class="btn btn-outline-success rounded-circle mb-4" style="width:80px;height:80px;font-size:2rem;line-height:65px;">🎤</div></center>
                    <div id="v-out" class="p-3 bg-light border rounded mb-4">Awaiting voice...</div>
                    <a href="/audit" class="btn btn-success btn-lg w-100">Next Step</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('mic-btn').onclick = () => {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRec(); rec.start();
            rec.onresult = (e) => { document.getElementById('v-out').innerText = e.results[0][0].transcript; };
        };
    </script>
</body>
</html>
