<!DOCTYPE html>
<html>
<head>
    <title>Voice Intake | AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-5">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI Assistant</a></div>
    </nav>

    <div class="container text-center">
        <div class="card shadow border-0 p-5 mx-auto" style="max-width: 600px;">
            <h2 class="text-success mb-4">Vernacular Voice Intake</h2>
            <p class="text-muted mb-5">Click the microphone and describe your farm (e.g., "I have 10 acres of organic wheat in Vellore").</p>
            
            <div id="mic-btn" class="btn btn-outline-success rounded-circle p-4 mb-4" style="width: 100px; height: 100px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; cursor: pointer;">
                🎤
            </div>
            
            <div id="v-out" class="p-3 bg-white border rounded mb-4 shadow-sm italic text-success min-vh-10" style="min-height: 100px;">
                Awaiting voice input...
            </div>

            <a href="/audit" class="btn btn-success btn-lg w-100">Proceed to Document Audit</a>
        </div>
    </div>

    <script>
        const mic = document.getElementById('mic-btn');
        mic.onclick = () => {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRec();
            rec.start();
            mic.classList.add('bg-success', 'text-white');
            mic.innerText = "Listening...";
            
            rec.onresult = (e) => {
                document.getElementById('v-out').innerText = `AI TRANSCRIPT: ${e.results[0][0].transcript}`;
                mic.classList.remove('bg-success', 'text-white');
                mic.innerText = "🎤";
            };
        };
    </script>
</body>
</html>
