<!DOCTYPE html>
<html>
<head>
    <title>Onboarding - AgriFin AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container"><a class="navbar-brand" href="/">🌾 AgriFin AI</a></div>
    </nav>

    <div class="container">
        <div class="hero-text-area">
            <h1>Voice Intake</h1>
            <p class="lead">Describe your farm needs in your own language</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5 text-center">
                    <div id="mic-btn" class="btn btn-outline-success rounded-circle mb-4 shadow-sm" style="width:100px; height:100px; font-size:2.5rem; line-height:80px; cursor:pointer;">🎤</div>
                    <div id="v-out" class="p-3 bg-light border rounded-3 mb-4 text-success italic" style="min-height:80px;">Awaiting voice input...</div>
                    <a href="/audit" class="btn btn-success btn-lg w-100 fw-bold">Proceed to Verification</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mic = document.getElementById('mic-btn');
        mic.onclick = () => {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRec();
            rec.start();
            mic.innerText = "⏳";
            rec.onresult = (e) => {
                document.getElementById('v-out').innerText = `PARSED: "${e.results[0][0].transcript}"`;
                mic.innerText = "🎤";
            };
        };
    </script>
</body>
</html>
